<svg xmlns="http://www.w3.org/2000/svg" width="780" height="410" viewBox="0 0 780 410">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <style>
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .cursor { animation: blink 1.2s step-end infinite; }
    </style>
  </defs>

  <rect x="10" y="8" width="760" height="392" rx="10" ry="10" fill="#1E1E2E" filter="url(#shadow)"/>
  <rect x="10" y="8" width="760" height="36" rx="10" ry="10" fill="#E8E6E3"/>
  <rect x="10" y="28" width="760" height="16" fill="#E8E6E3"/>
  <circle cx="32" cy="26" r="6" fill="#FF5F57"/>
  <circle cx="52" cy="26" r="6" fill="#FEBC2E"/>
  <circle cx="72" cy="26" r="6" fill="#28C840"/>
  <text x="390" y="31" font-family="Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="12" fill="#4B4B4B" text-anchor="middle">Terminal - zsh - 80x24</text>

  <rect x="10" y="44" width="760" height="356" fill="#1E1E2E"/>
  <rect x="10" y="390" width="760" height="10" rx="10" ry="10" fill="#1E1E2E"/>

  <g font-family="Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="13">
    <text x="22" y="72">
      <tspan fill="#A6E3A1">user@macbook ~/my-robotics-project $</tspan>
      <tspan fill="#CDD6F4"> ~/claude-devkit/scripts/setup.sh</tspan>
    </text>

    <text x="22" y="96" fill="#7F849C">Preparing project-local agent guidance...</text>
    <text x="22" y="118" fill="#A6E3A1">Created starter CLAUDE.md</text>
    <text x="22" y="140" fill="#A6E3A1">Created starter AGENTS.md</text>
    <text x="22" y="162" fill="#7F849C">Tip: run /init for suggestions, then use $intuitive-setup.</text>
    <text x="22" y="184" fill="#7F849C">Linking shared reference and Claude assets...</text>
    <text x="22" y="206" fill="#89DCEB">Linked context directory -&gt; /Users/user/claude-devkit/context</text>
    <text x="22" y="228" fill="#89DCEB">Linked .claude/commands directory -&gt; shared commands</text>
    <text x="22" y="250" fill="#89DCEB">Linked .claude/skills directory -&gt; shared skills</text>

    <text x="22" y="292">
      <tspan fill="#A6E3A1">user@macbook ~/my-robotics-project $</tspan>
      <tspan fill="#CDD6F4"> ls -l CLAUDE.md AGENTS.md</tspan>
    </text>

    <text x="22" y="316" fill="#7F849C">-rw-r--r--  user  staff  CLAUDE.md</text>
    <text x="22" y="338" fill="#7F849C">-rw-r--r--  user  staff  AGENTS.md</text>

    <text x="22" y="374">
      <tspan fill="#A6E3A1">user@macbook ~/my-robotics-project $</tspan>
    </text>
    <rect class="cursor" x="300" y="361" width="8" height="16" fill="#CDD6F4"/>
  </g>
</svg>
