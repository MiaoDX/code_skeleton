<svg xmlns="http://www.w3.org/2000/svg" width="780" height="410" viewBox="0 0 780 410">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <style>
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .cursor { animation: blink 1.2s step-end infinite; }
    </style>
  </defs>

  <rect x="10" y="8" width="760" height="392" rx="10" ry="10" fill="#1E1E2E" filter="url(#shadow)"/>
  <rect x="10" y="8" width="760" height="36" rx="10" ry="10" fill="#E8E6E3"/>
  <rect x="10" y="28" width="760" height="16" fill="#E8E6E3"/>
  <circle cx="32" cy="26" r="6" fill="#FF5F57"/>
  <circle cx="52" cy="26" r="6" fill="#FEBC2E"/>
  <circle cx="72" cy="26" r="6" fill="#28C840"/>
  <text x="390" y="31" font-family="Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="12" fill="#4B4B4B" text-anchor="middle">Claude Code - repo init</text>

  <rect x="10" y="44" width="760" height="356" fill="#1E1E2E"/>
  <rect x="10" y="390" width="760" height="10" rx="10" ry="10" fill="#1E1E2E"/>

  <g font-family="Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="13">
    <text x="22" y="72">
      <tspan fill="#A6E3A1">user@macbook ~/my-robotics-project $</tspan>
      <tspan fill="#CDD6F4"> claude</tspan>
    </text>

    <text x="22" y="104" fill="#F9E2AF">&gt; Read this skill:</text>
    <text x="42" y="126" fill="#89DCEB">https://github.com/MiaoDX/intuitive-flow/blob/main/skills/intuitive-init/SKILL.md</text>

    <text x="22" y="164" fill="#F9E2AF">&gt; Use $intuitive-init to initialize this repo.</text>
    <text x="42" y="188" fill="#CDD6F4">Run /init-style discovery if available.</text>
    <text x="42" y="212" fill="#CDD6F4">Preserve project-specific instructions.</text>
    <text x="42" y="236" fill="#CDD6F4">Propose a diff before applying.</text>

    <text x="22" y="276" fill="#A6E3A1">Agent:</text>
    <text x="82" y="276" fill="#7F849C">Reading README.md, AGENTS.md, CLAUDE.md, commands, and tests...</text>
    <text x="22" y="300" fill="#A6E3A1">Agent:</text>
    <text x="82" y="300" fill="#7F849C">Treating /init output as suggestions, not overwrite text.</text>
    <text x="22" y="324" fill="#A6E3A1">Agent:</text>
    <text x="82" y="324" fill="#7F849C">Ready to show a merged AGENTS.md / CLAUDE.md diff.</text>

    <text x="22" y="374">
      <tspan fill="#A6E3A1">user@macbook ~/my-robotics-project $</tspan>
    </text>
    <rect class="cursor" x="300" y="361" width="8" height="16" fill="#CDD6F4"/>
  </g>
</svg>
