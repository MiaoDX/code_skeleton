<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <style>
      text { font-family: Inter, system-ui, sans-serif; }
    </style>
    <!-- Arrow markers (color-matched) -->
    <marker id="arrow-teal" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#5eead4"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#a78bfa"/>
    </marker>
    <!-- Hub gradient overlay -->
    <linearGradient id="hub-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4338ca" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" rx="12" fill="#f8fafc"/>

  <!-- ════════════════════════════════════════ -->
  <!--              CENTRAL HUB                -->
  <!-- ════════════════════════════════════════ -->
  <rect x="260" y="28" width="280" height="138" rx="14" fill="#312e81"/>
  <rect x="260" y="28" width="280" height="138" rx="14" fill="url(#hub-grad)"/>
  <rect x="260" y="28" width="280" height="138" rx="14" fill="none" stroke="#4f46e5" stroke-width="1.5"/>

  <!-- Hub title -->
  <text x="400" y="62" text-anchor="middle" fill="#e0e7ff" font-size="17" font-weight="700" letter-spacing="0.3">claude-devkit</text>
  <!-- Divider -->
  <line x1="280" y1="74" x2="520" y2="74" stroke="#4f46e5" stroke-width="0.8" opacity="0.5"/>
  <!-- Hub components -->
  <text x="400" y="96" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="500">CLAUDE.md</text>
  <text x="400" y="114" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="500">skills/    commands/</text>
  <text x="400" y="132" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="500">scripts/    hooks/</text>

  <!-- Decorative dots -->
  <rect x="272" y="40" width="8" height="8" rx="2" fill="#6366f1" opacity="0.6"/>
  <rect x="284" y="40" width="8" height="8" rx="2" fill="#818cf8" opacity="0.5"/>
  <rect x="296" y="40" width="8" height="8" rx="2" fill="#a5b4fc" opacity="0.4"/>

  <!-- ════════════════════════════════════════ -->
  <!--            PROJECT NODES                -->
  <!-- ════════════════════════════════════════ -->

  <!-- Project 1: robotics-project (left) -->
  <rect x="30" y="56" width="170" height="58" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="30" y="56" width="4" height="58" rx="2" fill="#14b8a6"/>
  <text x="52" y="82" fill="#134e4a" font-size="13" font-weight="600">robotics-project</text>
  <text x="115" y="98" text-anchor="middle" fill="#5eead4" font-size="10" font-weight="500">~/ws/robotics</text>

  <!-- Project 2: web-app (top right) -->
  <rect x="600" y="56" width="170" height="58" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="600" y="56" width="4" height="58" rx="2" fill="#3b82f6"/>
  <text x="622" y="82" fill="#1e3a5f" font-size="13" font-weight="600">web-app</text>
  <text x="685" y="98" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="500">~/ws/web-app</text>

  <!-- Project 3: ml-pipeline (bottom right) -->
  <rect x="600" y="136" width="170" height="58" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="600" y="136" width="4" height="58" rx="2" fill="#8b5cf6"/>
  <text x="622" y="162" fill="#3b0764" font-size="13" font-weight="600">ml-pipeline</text>
  <text x="685" y="178" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="500">~/ws/ml-pipeline</text>

  <!-- ════════════════════════════════════════ -->
  <!--            SYMLINK ARROWS               -->
  <!-- ════════════════════════════════════════ -->

  <!-- Hub -> robotics-project -->
  <path d="M 260 70 C 225 68, 215 80, 200 85" fill="none" stroke="#5eead4" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#arrow-teal)"/>
  <rect x="196" y="60" width="58" height="18" rx="4" fill="#f0fdfa" stroke="#ccfbf1" stroke-width="0.5"/>
  <text x="225" y="72" text-anchor="middle" fill="#0d9488" font-size="10" font-weight="600">symlink</text>

  <!-- Hub -> web-app -->
  <path d="M 540 70 C 565 68, 580 78, 600 82" fill="none" stroke="#60a5fa" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#arrow-blue)"/>
  <rect x="546" y="60" width="58" height="18" rx="4" fill="#eff6ff" stroke="#dbeafe" stroke-width="0.5"/>
  <text x="575" y="72" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="600">symlink</text>

  <!-- Hub -> ml-pipeline -->
  <path d="M 540 140 C 565 145, 580 155, 600 160" fill="none" stroke="#a78bfa" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#arrow-purple)"/>
  <rect x="546" y="140" width="58" height="18" rx="4" fill="#f5f3ff" stroke="#ede9fe" stroke-width="0.5"/>
  <text x="575" y="152" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="600">symlink</text>

  <!-- ════════════════════════════════════════ -->
  <!--      SEPARATOR: AI tools zone           -->
  <!-- ════════════════════════════════════════ -->

  <!-- Vertical connector from hub down to separator -->
  <line x1="400" y1="166" x2="400" y2="260" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- Dashed horizontal separator -->
  <line x1="80" y1="260" x2="350" y2="260" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="450" y1="260" x2="720" y2="260" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- Centered label on separator -->
  <rect x="310" y="248" width="180" height="22" rx="4" fill="#f8fafc"/>
  <text x="400" y="264" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="500" letter-spacing="0.5">AI tools read shared config</text>

  <!-- ════════════════════════════════════════ -->
  <!--            AI TOOL CARDS                -->
  <!-- ════════════════════════════════════════ -->

  <!-- Claude Code -->
  <rect x="80" y="300" width="180" height="72" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="80" y="300" width="180" height="26" rx="10" fill="#fff7ed"/>
  <rect x="80" y="316" width="180" height="10" fill="#fff7ed"/>
  <rect x="80" y="300" width="4" height="72" rx="2" fill="#f97316"/>
  <text x="170" y="318" text-anchor="middle" fill="#9a3412" font-size="14" font-weight="700">Claude Code</text>
  <text x="170" y="340" text-anchor="middle" fill="#78716c" font-size="11">Anthropic</text>
  <text x="170" y="357" text-anchor="middle" fill="#a8a29e" font-size="10">CLAUDE.md + skills/</text>
  <!-- Connector up -->
  <path d="M 170 300 L 170 280 C 170 268, 250 260, 400 260" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.5"/>

  <!-- Codex -->
  <rect x="310" y="300" width="180" height="72" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="310" y="300" width="180" height="26" rx="10" fill="#f0fdf4"/>
  <rect x="310" y="316" width="180" height="10" fill="#f0fdf4"/>
  <rect x="310" y="300" width="4" height="72" rx="2" fill="#22c55e"/>
  <text x="400" y="318" text-anchor="middle" fill="#166534" font-size="14" font-weight="700">Codex</text>
  <text x="400" y="340" text-anchor="middle" fill="#78716c" font-size="11">OpenAI</text>
  <text x="400" y="357" text-anchor="middle" fill="#a8a29e" font-size="10">AGENTS.md + codex.md</text>
  <!-- Connector up -->
  <line x1="400" y1="300" x2="400" y2="260" stroke="#4ade80" stroke-width="1" opacity="0.5"/>

  <!-- Gemini CLI -->
  <rect x="540" y="300" width="180" height="72" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="540" y="300" width="180" height="26" rx="10" fill="#f0f9ff"/>
  <rect x="540" y="316" width="180" height="10" fill="#f0f9ff"/>
  <rect x="540" y="300" width="4" height="72" rx="2" fill="#0ea5e9"/>
  <text x="630" y="318" text-anchor="middle" fill="#0c4a6e" font-size="14" font-weight="700">Gemini CLI</text>
  <text x="630" y="340" text-anchor="middle" fill="#78716c" font-size="11">Google</text>
  <text x="630" y="357" text-anchor="middle" fill="#a8a29e" font-size="10">GEMINI.md + gemini/</text>
  <!-- Connector up -->
  <path d="M 630 300 L 630 280 C 630 268, 550 260, 400 260" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>

  <!-- ════════════════════════════════════════ -->
  <!--              FOOTER LABEL               -->
  <!-- ════════════════════════════════════════ -->
  <text x="400" y="420" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="400">One source of truth — many projects, many AI tools</text>

</svg>
