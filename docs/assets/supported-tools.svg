<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380">
  <defs>
    <style>
      .layer-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 10.5px; font-weight: 700; letter-spacing: 1.8px; }
      .pill-text-lg { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 15px; font-weight: 600; }
      .pill-text-md { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 12.5px; font-weight: 600; }
      .pill-text-sm { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 11.5px; font-weight: 600; }
      .layer-rect-stroke { stroke: #e2e8f0; stroke-width: 1; }
    </style>
  </defs>

  <!-- ═══ Outer frame ═══ -->
  <rect width="720" height="380" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════════════════════
       LAYER 1 — AI AGENTS  (the runtimes that drive everything)
       ═══════════════════════════════════════════════════════════════ -->
  <rect x="16" y="20" width="688" height="100" rx="10" fill="#fef3ec" opacity="0.45" class="layer-rect-stroke"/>
  <text x="32" y="42" class="layer-label" fill="#b9501f">AI AGENTS</text>

  <!-- Claude Code pill -->
  <g transform="translate(228, 82)">
    <rect x="-100" y="-30" width="200" height="60" rx="30" fill="white" stroke="#D97757" stroke-width="1.8"/>
    <g transform="translate(-55, 0)">
      <line x1="0" y1="-13" x2="0" y2="13" stroke="#D97757" stroke-width="2.6" stroke-linecap="round"/>
      <line x1="-11" y1="-6.5" x2="11" y2="6.5" stroke="#D97757" stroke-width="2.6" stroke-linecap="round"/>
      <line x1="-11" y1="6.5" x2="11" y2="-6.5" stroke="#D97757" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="3.2" fill="#D97757"/>
    </g>
    <text x="-32" y="6" class="pill-text-lg" fill="#D97757" text-anchor="start">Claude Code</text>
  </g>

  <!-- Codex pill -->
  <g transform="translate(492, 82)">
    <rect x="-100" y="-30" width="200" height="60" rx="30" fill="white" stroke="#10A37F" stroke-width="1.8"/>
    <text x="-44" y="7" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" fill="#10A37F" text-anchor="middle">&lt;/&gt;</text>
    <text x="-22" y="6" class="pill-text-lg" fill="#10A37F" text-anchor="start">Codex</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════
       LAYER 2 — INTEGRATION SURFACES  (what the agents reach for)
       ═══════════════════════════════════════════════════════════════ -->
  <rect x="16" y="140" width="688" height="100" rx="10" fill="#eff6ff" opacity="0.55" class="layer-rect-stroke"/>
  <text x="32" y="162" class="layer-label" fill="#1e40af">INTEGRATION SURFACES</text>

  <!-- Commands -->
  <g transform="translate(102, 200)">
    <rect x="-70" y="-22" width="140" height="44" rx="22" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="0" y="5" class="pill-text-md" fill="#1e40af" text-anchor="middle">⌘  Commands</text>
  </g>
  <!-- Skills -->
  <g transform="translate(274, 200)">
    <rect x="-70" y="-22" width="140" height="44" rx="22" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="0" y="5" class="pill-text-md" fill="#1e40af" text-anchor="middle">★  Skills</text>
  </g>
  <!-- Plugins -->
  <g transform="translate(446, 200)">
    <rect x="-70" y="-22" width="140" height="44" rx="22" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="0" y="5" class="pill-text-md" fill="#1e40af" text-anchor="middle">◆  Plugins</text>
  </g>
  <!-- MCP Servers -->
  <g transform="translate(618, 200)">
    <rect x="-70" y="-22" width="140" height="44" rx="22" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="0" y="5" class="pill-text-md" fill="#1e40af" text-anchor="middle">⚡  MCP Servers</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════
       LAYER 3 — FRAMEWORKS & SOURCES  (where the surfaces come from)
       ═══════════════════════════════════════════════════════════════ -->
  <rect x="16" y="260" width="688" height="100" rx="10" fill="#f5f3ff" opacity="0.55" class="layer-rect-stroke"/>
  <text x="32" y="282" class="layer-label" fill="#5b21b6">FRAMEWORKS &amp; SOURCES</text>

  <!-- GSD -->
  <g transform="translate(90, 320)">
    <rect x="-58" y="-22" width="116" height="44" rx="22" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="0" y="5" class="pill-text-sm" fill="#5b21b6" text-anchor="middle">GSD</text>
  </g>
  <!-- GStack -->
  <g transform="translate(225, 320)">
    <rect x="-58" y="-22" width="116" height="44" rx="22" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="0" y="5" class="pill-text-sm" fill="#5b21b6" text-anchor="middle">GStack</text>
  </g>
  <!-- Anthropics skills -->
  <g transform="translate(360, 320)">
    <rect x="-58" y="-22" width="116" height="44" rx="22" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="0" y="5" class="pill-text-sm" fill="#5b21b6" text-anchor="middle">Anthropics</text>
  </g>
  <!-- Codex skills directory -->
  <g transform="translate(495, 320)">
    <rect x="-58" y="-22" width="116" height="44" rx="22" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="0" y="5" class="pill-text-sm" fill="#5b21b6" text-anchor="middle">Codex Skills</text>
  </g>
  <!-- mattpocock -->
  <g transform="translate(630, 320)">
    <rect x="-58" y="-22" width="116" height="44" rx="22" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="0" y="5" class="pill-text-sm" fill="#5b21b6" text-anchor="middle">mattpocock</text>
  </g>

  <!-- Subtle layer flow indicator (right edge) -->
  <g opacity="0.45">
    <line x1="708" y1="120" x2="708" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>
    <line x1="708" y1="240" x2="708" y2="260" stroke="#cbd5e1" stroke-width="1.5"/>
    <polygon points="708,124 705,118 711,118" fill="#cbd5e1"/>
    <polygon points="708,244 705,238 711,238" fill="#cbd5e1"/>
  </g>
</svg>
