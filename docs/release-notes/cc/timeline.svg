<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" style="background: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f2937"/>
      <stop offset="100%" style="stop-color:#374151"/>
    </linearGradient>
    <linearGradient id="timelineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="phase1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="phase2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="phase3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="phase4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="phase5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="phase6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="#0d1117"/>

  <!-- Grid lines -->
  <g stroke="#21262d" stroke-width="1">
    <line x1="0" y1="100" x2="1400" y2="100"/>
    <line x1="0" y1="780" x2="1400" y2="780"/>
    <line x1="100" y1="0" x2="100" y2="900"/>
    <line x1="1300" y1="0" x2="1300" y2="900"/>
  </g>

  <!-- Title -->
  <text x="700" y="50" text-anchor="middle" fill="#f0f6fc" font-size="28" font-weight="bold" filter="url(#glow)">
    Claude Code Evolution Timeline
  </text>
  <text x="700" y="80" text-anchor="middle" fill="#8b949e" font-size="14">
    From Beta (v0.2.21) to Current (v2.1.62) — Major Milestones & Feature Eras
  </text>

  <!-- Main Timeline Line -->
  <line x1="150" y1="420" x2="1250" y2="420" stroke="url(#timelineGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Era 1: Early Beta (0.2.x) -->
  <g transform="translate(200, 200)">
    <rect x="-80" y="-60" width="160" height="120" rx="12" fill="url(#phase1)" opacity="0.15" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="0" cy="220" r="8" fill="#f59e0b"/>
    <text x="0" y="-35" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">EARLY BETA</text>
    <text x="0" y="-15" text-anchor="middle" fill="#f0f6fc" font-size="11">v0.2.21 - 0.2.93</text>
    <text x="0" y="5" text-anchor="middle" fill="#e5e7eb" font-size="10">Foundation Features</text>
    <g font-size="9" fill="#9ca3af">
      <text x="0" y="25" text-anchor="middle">• MCP Protocol Support</text>
      <text x="0" y="40" text-anchor="middle">• Custom Slash Commands</text>
      <text x="0" y="55" text-anchor="middle">• Vim Keybindings</text>
      <text x="0" y="70" text-anchor="middle">• Web Fetch Tool</text>
      <text x="0" y="85" text-anchor="middle">• @-mention Files</text>
    </g>
  </g>

  <!-- Era 2: Pre-GA (0.2.93 - 1.0.0) -->
  <g transform="translate(380, 580)">
    <rect x="-80" y="-60" width="160" height="120" rx="12" fill="url(#phase2)" opacity="0.15" stroke="#10b981" stroke-width="2"/>
    <circle cx="0" cy="-160" r="8" fill="#10b981"/>
    <text x="0" y="-35" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">PRE-GA</text>
    <text x="0" y="-15" text-anchor="middle" fill="#f0f6fc" font-size="11">v0.2.93 - 1.0.0</text>
    <text x="0" y="5" text-anchor="middle" fill="#e5e7eb" font-size="10">Maturation Phase</text>
    <g font-size="9" fill="#9ca3af">
      <text x="0" y="25" text-anchor="middle">• TypeScript SDK</text>
      <text x="0" y="40" text-anchor="middle">• Python SDK</text>
      <text x="0" y="55" text-anchor="middle">• Web Search</text>
      <text x="0" y="70" text-anchor="middle">• --resume/--continue</text>
      <text x="0" y="85" text-anchor="middle">• Breaking Changes</text>
    </g>
  </g>

  <!-- Era 3: GA Release (1.0.x) -->
  <g transform="translate(560, 200)">
    <rect x="-80" y="-60" width="160" height="120" rx="12" fill="url(#phase3)" opacity="0.15" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="0" cy="220" r="10" fill="#3b82f6" filter="url(#glow)"/>
    <text x="0" y="-35" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="bold">GA RELEASE 🚀</text>
    <text x="0" y="-15" text-anchor="middle" fill="#f0f6fc" font-size="11">v1.0.0 - 1.0.65</text>
    <text x="0" y="5" text-anchor="middle" fill="#e5e7eb" font-size="10">General Availability</text>
    <g font-size="9" fill="#9ca3af">
      <text x="0" y="25" text-anchor="middle">• Sonnet 4 & Opus 4</text>
      <text x="0" y="40" text-anchor="middle">• Hooks System</text>
      <text x="0" y="55" text-anchor="middle">• Custom Agents</text>
      <text x="0" y="70" text-anchor="middle">• Background Tasks</text>
      <text x="0" y="85" text-anchor="middle">• Subagents (Task tool)</text>
    </g>
  </g>

  <!-- Era 4: 1.x Growth (1.0.x) -->
  <g transform="translate(740, 580)">
    <rect x="-80" y="-60" width="160" height="120" rx="12" fill="url(#phase4)" opacity="0.15" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="0" cy="-160" r="8" fill="#8b5cf6"/>
    <text x="0" y="-35" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="bold">PLUGIN ERA</text>
    <text x="0" y="-15" text-anchor="middle" fill="#f0f6fc" font-size="11">v1.0.60 - 1.0.125</text>
    <text x="0" y="5" text-anchor="middle" fill="#e5e7eb" font-size="10">Extensibility Focus</text>
    <g font-size="9" fill="#9ca3af">
      <text x="0" y="25" text-anchor="middle">• Plugin System</text>
      <text x="0" y="40" text-anchor="middle">• Output Styles</text>
      <text x="0" y="55" text-anchor="middle">• Skills Framework</text>
      <text x="0" y="70" text-anchor="middle">• LSP Tool</text>
      <text x="0" y="85" text-anchor="middle">• Sandbox Mode</text>
    </g>
  </g>

  <!-- Era 5: 2.0 Major (2.0.0) -->
  <g transform="translate(920, 200)">
    <rect x="-80" y="-60" width="160" height="120" rx="12" fill="url(#phase5)" opacity="0.15" stroke="#ec4899" stroke-width="2"/>
    <circle cx="0" cy="220" r="10" fill="#ec4899" filter="url(#glow)"/>
    <text x="0" y="-35" text-anchor="middle" fill="#ec4899" font-size="13" font-weight="bold">2.0 MAJOR 🎉</text>
    <text x="0" y="-15" text-anchor="middle" fill="#f0f6fc" font-size="11">v2.0.0 - 2.0.50</text>
    <text x="0" y="5" text-anchor="middle" fill="#e5e7eb" font-size="10">Complete Overhaul</text>
    <g font-size="9" fill="#9ca3af">
      <text x="0" y="25" text-anchor="middle">• VS Code Extension</text>
      <text x="0" y="40" text-anchor="middle">• /rewind Command</text>
      <text x="0" y="55" text-anchor="middle">• /usage Command</text>
      <text x="0" y="70" text-anchor="middle">• New UI/UX Design</text>
      <text x="0" y="85" text-anchor="middle">• Claude Agent SDK</text>
    </g>
  </g>

  <!-- Era 6: 2.1 Current (2.1.x) -->
  <g transform="translate(1100, 580)">
    <rect x="-80" y="-60" width="160" height="120" rx="12" fill="url(#phase6)" opacity="0.15" stroke="#f97316" stroke-width="2"/>
    <circle cx="0" cy="-160" r="12" fill="#f97316" filter="url(#glow)"/>
    <text x="0" y="-35" text-anchor="middle" fill="#f97316" font-size="13" font-weight="bold">CURRENT ERA ✨</text>
    <text x="0" y="-15" text-anchor="middle" fill="#f0f6fc" font-size="11">v2.1.0 - 2.1.62</text>
    <text x="0" y="5" text-anchor="middle" fill="#e5e7eb" font-size="10">AI-Native Features</text>
    <g font-size="9" fill="#9ca3af">
      <text x="0" y="25" text-anchor="middle">• Agent Teams 🤖🤝🤖</text>
      <text x="0" y="40" text-anchor="middle">• Opus 4.5 & 4.6</text>
      <text x="0" y="55" text-anchor="middle">• Fast Mode ⚡</text>
      <text x="0" y="70" text-anchor="middle">• Auto-Memory System</text>
      <text x="0" y="85" text-anchor="middle">• 1M Context Window</text>
    </g>
  </g>

  <!-- Feature Highlights Bar -->
  <rect x="50" y="680" width="1300" height="180" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="700" y="710" text-anchor="middle" fill="#f0f6fc" font-size="16" font-weight="bold">Key Capability Evolution</text>

  <!-- Capability categories -->
  <g transform="translate(150, 740)">
    <rect x="0" y="0" width="180" height="100" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="90" y="25" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">Core Tools</text>
    <g font-size="9" fill="#9ca3af">
      <text x="10" y="45">→ Bash → File Ops</text>
      <text x="10" y="60">→ MCP Integration</text>
      <text x="10" y="75">→ LSP Support</text>
      <text x="10" y="90">→ Web Search</text>
    </g>
  </g>

  <g transform="translate(360, 740)">
    <rect x="0" y="0" width="180" height="100" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="90" y="25" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">Extensibility</text>
    <g font-size="9" fill="#9ca3af">
      <text x="10" y="45">→ Slash Commands</text>
      <text x="10" y="60">→ Hooks System</text>
      <text x="10" y="75">→ Plugins</text>
      <text x="10" y="90">→ Skills Framework</text>
    </g>
  </g>

  <g transform="translate(570, 740)">
    <rect x="0" y="0" width="180" height="100" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="90" y="25" text-anchor="middle" fill="#f472b6" font-size="11" font-weight="bold">AI/Agents</text>
    <g font-size="9" fill="#9ca3af">
      <text x="10" y="45">→ Subagents</text>
      <text x="10" y="60">→ Agent Teams</text>
      <text x="10" y="75">→ Plan Mode</text>
      <text x="10" y="90">→ Auto-Memory</text>
    </g>
  </g>

  <g transform="translate(780, 740)">
    <rect x="0" y="0" width="180" height="100" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="90" y="25" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">Platform</text>
    <g font-size="9" fill="#9ca3af">
      <text x="10" y="45">→ CLI → VS Code</text>
      <text x="10" y="60">→ Desktop App</text>
      <text x="10" y="75">→ Claude.ai Web</text>
      <text x="10" y="90">→ Chrome Extension</text>
    </g>
  </g>

  <g transform="translate(990, 740)">
    <rect x="0" y="0" width="180" height="100" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="90" y="25" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="bold">Models</text>
    <g font-size="9" fill="#9ca3af">
      <text x="10" y="45">→ Sonnet 3.7/4</text>
      <text x="10" y="60">→ Opus 4 → 4.5 → 4.6</text>
      <text x="10" y="75">→ Haiku 4.5</text>
      <text x="10" y="90">→ 1M Context + Fast Mode</text>
    </g>
  </g>

  <!-- Legend/Date markers -->
  <text x="700" y="640" text-anchor="middle" fill="#6b7280" font-size="10">
    Timeline: Early 2024 (Beta) → Mid 2024 (GA) → Late 2024 (2.0) → 2025 (Current)
  </text>

  <!-- Connecting lines between eras -->
  <path d="M 280 420 Q 330 420 340 480" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 460 480 Q 470 420 520 420" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 640 420 Q 690 420 700 480" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 820 480 Q 830 420 880 420" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 1000 420 Q 1050 420 1060 480" stroke="#ec4899" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>