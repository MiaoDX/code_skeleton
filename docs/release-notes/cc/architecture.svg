<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 850" style="background: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <defs>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="extGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#be185d"/>
    </linearGradient>
    <linearGradient id="platformGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="850" fill="#0d1117"/>

  <!-- Title -->
  <text x="700" y="45" text-anchor="middle" fill="#f0f6fc" font-size="26" font-weight="bold" filter="url(#glow3)">Claude Code Architecture (v2.1.x)</text>
  <text x="700" y="70" text-anchor="middle" fill="#8b949e" font-size="13">Current feature ecosystem and integration points</text>

  <!-- Core Engine Box -->
  <g transform="translate(350, 100)">
    <rect x="0" y="0" width="300" height="180" rx="12" fill="url(#coreGrad)" opacity="0.15" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="25" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="bold">🔧 CORE ENGINE</text>

    <rect x="20" y="40" width="125" height="28" rx="6" fill="#1f2937" stroke="#374151"/>
    <text x="82" y="58" text-anchor="middle" fill="#e5e7eb" font-size="10">Bash Tool</text>

    <rect x="155" y="40" width="125" height="28" rx="6" fill="#1f2937" stroke="#374151"/>
    <text x="217" y="58" text-anchor="middle" fill="#e5e7eb" font-size="10">File Operations</text>

    <rect x="20" y="75" width="125" height="28" rx="6" fill="#1f2937" stroke="#374151"/>
    <text x="82" y="93" text-anchor="middle" fill="#e5e7eb" font-size="10">Search (Grep/Glob)</text>

    <rect x="155" y="75" width="125" height="28" rx="6" fill="#1f2937" stroke="#374151"/>
    <text x="217" y="93" text-anchor="middle" fill="#e5e7eb" font-size="10">LSP Tool</text>

    <rect x="20" y="110" width="125" height="28" rx="6" fill="#1f2937" stroke="#374151"/>
    <text x="82" y="128" text-anchor="middle" fill="#e5e7eb" font-size="10">Web Fetch/Search</text>

    <rect x="155" y="110" width="125" height="28" rx="6" fill="#1f2937" stroke="#374151"/>
    <text x="217" y="128" text-anchor="middle" fill="#e5e7eb" font-size="10">NotebookEdit</text>

    <rect x="87" y="145" width="125" height="28" rx="6" fill="#1f2937" stroke="#374151"/>
    <text x="150" y="163" text-anchor="middle" fill="#e5e7eb" font-size="10">PDF Support</text>
  </g>

  <!-- Extensibility Layer -->
  <g transform="translate(700, 100)">
    <rect x="0" y="0" width="350" height="220" rx="12" fill="url(#extGrad)" opacity="0.15" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
    <text x="175" y="25" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">🧩 EXTENSIBILITY</text>

    <!-- MCP Section -->
    <rect x="20" y="35" width="150" height="80" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="95" y="52" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">MCP Protocol</text>
    <text x="95" y="70" text-anchor="middle" fill="#9ca3af" font-size="9">• Tools, Resources</text>
    <text x="95" y="85" text-anchor="middle" fill="#9ca3af" font-size="9">• OAuth, SSE</text>
    <text x="95" y="100" text-anchor="middle" fill="#9ca3af" font-size="9">• Streamable HTTP</text>

    <!-- Skills Section -->
    <rect x="180" y="35" width="150" height="80" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="255" y="52" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">Skills</text>
    <text x="255" y="70" text-anchor="middle" fill="#9ca3af" font-size="9">• Custom Commands</text>
    <text x="255" y="85" text-anchor="middle" fill="#9ca3af" font-size="9">• Frontmatter Config</text>
    <text x="255" y="100" text-anchor="middle" fill="#9ca3af" font-size="9">• Hot Reload</text>

    <!-- Hooks Section -->
    <rect x="20" y="125" width="150" height="80" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="95" y="142" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">Hooks</text>
    <text x="95" y="160" text-anchor="middle" fill="#9ca3af" font-size="9">• PreToolUse</text>
    <text x="95" y="175" text-anchor="middle" fill="#9ca3af" font-size="9">• PostToolUse</text>
    <text x="95" y="190" text-anchor="middle" fill="#9ca3af" font-size="9">• SessionStart/End</text>

    <!-- Plugins Section -->
    <rect x="180" y="125" width="150" height="80" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="255" y="142" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">Plugins</text>
    <text x="255" y="160" text-anchor="middle" fill="#9ca3af" font-size="9">• Git/npm Sources</text>
    <text x="255" y="175" text-anchor="middle" fill="#9ca3af" font-size="9">• Marketplace</text>
    <text x="255" y="190" text-anchor="middle" fill="#9ca3af" font-size="9">• Auto-update</text>
  </g>

  <!-- AI/Agents Layer -->
  <g transform="translate(50, 360)">
    <rect x="0" y="0" width="400" height="240" rx="12" fill="url(#aiGrad)" opacity="0.15" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="25" text-anchor="middle" fill="#f472b6" font-size="14" font-weight="bold">🤖 AI & AGENTS</text>

    <!-- Models -->
    <rect x="20" y="40" width="170" height="80" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="105" y="57" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="bold">Models</text>
    <text x="105" y="75" text-anchor="middle" fill="#9ca3af" font-size="9">Opus 4.6 (Fast Mode)</text>
    <text x="105" y="90" text-anchor="middle" fill="#9ca3af" font-size="9">Sonnet 4.6 (1M context)</text>
    <text x="105" y="105" text-anchor="middle" fill="#9ca3af" font-size="9">Haiku 4.5 (Explore)</text>

    <!-- Agent Types -->
    <rect x="210" y="40" width="170" height="80" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="295" y="57" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="bold">Agent Types</text>
    <text x="295" y="75" text-anchor="middle" fill="#9ca3af" font-size="9">General Purpose</text>
    <text x="295" y="90" text-anchor="middle" fill="#9ca3af" font-size="9">Explore (Haiku)</text>
    <text x="295" y="105" text-anchor="middle" fill="#9ca3af" font-size="9">Plan (Opus)</text>

    <!-- Features -->
    <rect x="20" y="130" width="360" height="90" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="200" y="147" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="bold">Key Features</text>

    <text x="40" y="168" fill="#9ca3af" font-size="9">• Agent Teams (multi-agent)</text>
    <text x="40" y="185" fill="#9ca3af" font-size="9">• Subagents (Task tool)</text>
    <text x="40" y="202" fill="#9ca3af" font-size="9">• Background Agents</text>

    <text x="210" y="168" fill="#9ca3af" font-size="9">• Plan Mode (/plan)</text>
    <text x="210" y="185" fill="#9ca3af" font-size="9">• Thinking Mode (Tab/Alt+T)</text>
    <text x="210" y="202" fill="#9ca3af" font-size="9">• Auto-Memory</text>
  </g>

  <!-- Platform Layer -->
  <g transform="translate(480, 360)">
    <rect x="0" y="0" width="280" height="240" rx="12" fill="url(#platformGrad)" opacity="0.15" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
    <text x="140" y="25" text-anchor="middle" fill="#34d399" font-size="14" font-weight="bold">💻 PLATFORMS</text>

    <rect x="20" y="40" width="240" height="40" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="140" y="58" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">Terminal (CLI)</text>
    <text x="140" y="72" text-anchor="middle" fill="#9ca3af" font-size="9">Native binary, npm, Windows, macOS, Linux</text>

    <rect x="20" y="90" width="240" height="40" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="140" y="108" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">VS Code Extension</text>
    <text x="140" y="122" text-anchor="middle" fill="#9ca3af" font-size="9">Full IDE integration, secondary sidebar</text>

    <rect x="20" y="140" width="240" height="40" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="140" y="158" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">Desktop App</text>
    <text x="140" y="172" text-anchor="middle" fill="#9ca3af" font-size="9">Native desktop experience (v2.0.51+)</text>

    <rect x="20" y="190" width="240" height="40" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="140" y="208" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">Claude.ai Web + Chrome</text>
    <text x="140" y="222" text-anchor="middle" fill="#9ca3af" font-size="9">Browser extension, teleport sessions</text>
  </g>

  <!-- Session & Context -->
  <g transform="translate(790, 360)">
    <rect x="0" y="0" width="280" height="240" rx="12" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="140" y="25" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">📁 SESSION & CONTEXT</text>

    <rect x="20" y="40" width="115" height="60" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="77" y="57" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="bold">Session</text>
    <text x="77" y="75" text-anchor="middle" fill="#9ca3af" font-size="9">• --resume/--continue</text>
    <text x="77" y="90" text-anchor="middle" fill="#9ca3af" font-size="9">• Named sessions</text>

    <rect x="145" y="40" width="115" height="60" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="202" y="57" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="bold">Context</text>
    <text x="202" y="75" text-anchor="middle" fill="#9ca3af" font-size="9">• CLAUDE.md</text>
    <text x="202" y="90" text-anchor="middle" fill="#9ca3af" font-size="9">• /context cmd</text>

    <rect x="20" y="110" width="240" height="50" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="140" y="128" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="bold">Memory & Rules</text>
    <text x="140" y="148" text-anchor="middle" fill="#9ca3af" font-size="9">~/.claude/, .claude/skills/, .claude/rules/, Auto-memory</text>

    <rect x="20" y="170" width="240" height="50" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="140" y="188" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="bold">Commands</text>
    <text x="140" y="208" text-anchor="middle" fill="#9ca3af" font-size="9">/compact, /rewind, /fork, /usage, /stats, /copy</text>
  </g>

  <!-- SDK & Integration -->
  <g transform="translate(1090, 360)">
    <rect x="0" y="0" width="260" height="240" rx="12" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="25" text-anchor="middle" fill="#67e8f9" font-size="14" font-weight="bold">🔌 SDK & INTEGRATION</text>

    <rect x="20" y="40" width="220" height="50" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="130" y="60" text-anchor="middle" fill="#a5f3fc" font-size="11" font-weight="bold">Claude Agent SDK</text>
    <text x="130" y="78" text-anchor="middle" fill="#9ca3af" font-size="9">TypeScript: @anthropic-ai/claude-agent-sdk</text>

    <rect x="20" y="100" width="220" height="50" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="130" y="120" text-anchor="middle" fill="#a5f3fc" font-size="11" font-weight="bold">Remote Control</text>
    <text x="130" y="138" text-anchor="middle" fill="#9ca3af" font-size="9">claude remote-control, headless mode</text>

    <rect x="20" y="160" width="220" height="60" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="130" y="180" text-anchor="middle" fill="#a5f3fc" font-size="11" font-weight="bold">Enterprise</text>
    <text x="130" y="198" text-anchor="middle" fill="#9ca3af" font-size="9">• Managed settings</text>
    <text x="130" y="213" text-anchor="middle" fill="#9ca3af" font-size="9">• ConfigChange hooks</text>
  </g>

  <!-- Connection arrows -->
  <g stroke="#374151" stroke-width="1.5" fill="none" stroke-dasharray="5,3" opacity="0.6">
    <!-- Core <-> Extensibility -->
    <path d="M 650 190 L 700 190"/>
    <!-- Core <-> Agents -->
    <path d="M 400 280 L 250 360"/>
    <!-- Extensibility <-> Agents -->
    <path d="M 700 320 L 450 360"/>
    <!-- Agents <-> Platform -->
    <path d="M 450 480 L 480 480"/>
    <!-- Platform <-> Session -->
    <path d="M 760 480 L 790 480"/>
    <!-- Session <-> SDK -->
    <path d="M 1070 480 L 1090 480"/>
  </g>

  <!-- Footer -->
  <rect x="50" y="630" width="1300" height="190" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="700" y="660" text-anchor="middle" fill="#f0f6fc" font-size="14" font-weight="bold">🚀 Recent Major Additions (v2.1.x)</text>

  <g font-size="10" fill="#9ca3af">
    <text x="100" y="690" fill="#fbbf24">✨ Agent Teams</text>
    <text x="100" y="710">Multi-agent collaboration with</text>
    <text x="100" y="725">teammates working in parallel</text>

    <text x="320" y="690" fill="#f472b6">⚡ Fast Mode</text>
    <text x="320" y="710">Accelerated responses for</text>
    <text x="320" y="725">Opus 4.6 with 1M context</text>

    <text x="540" y="690" fill="#34d399">🧠 Auto-Memory</text>
    <text x="540" y="710">Claude automatically records</text>
    <text x="540" y="725">and recalls useful context</text>

    <text x="760" y="690" fill="#a78bfa">🔧 Task System</text>
    <text x="760" y="710">New task management with</text>
    <text x="760" y="725">dependency tracking</text>

    <text x="980" y="690" fill="#60a5fa">🎹 Custom Keybindings</text>
    <text x="980" y="710">Configurable keyboard shortcuts</text>
    <text x="980" y="725">with chord sequences</text>

    <text x="1200" y="690" fill="#67e8f9">📊 /stats Command</text>
    <text x="1200" y="710">Usage analytics with graphs</text>
    <text x="1200" y="725">and usage streaks</text>
  </g>

  <text x="700" y="770" text-anchor="middle" fill="#6b7280" font-size="10">
    Current Version: 2.1.62 | See full release notes at: https://code.claude.com/docs/en/release-notes
  </text>

  <!-- Legend -->
  <g transform="translate(50, 805)">
    <text x="0" y="0" fill="#6b7280" font-size="9">Architecture diagram based on release notes analysis. Feature availability may vary by platform and subscription tier.</text>
  </g>

</svg>